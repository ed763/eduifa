<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Memory Match Game - 10 Minute Timer</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #2c3e50;
    color: #ecf0f1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }
  h1 {
    margin-bottom: 10px;
  }
  #timer {
    font-size: 2rem;
    margin-bottom: 20px;
    font-weight: bold;
  }
  #game-board {
    display: grid;
    grid-template-columns: repeat(4, 100px);
    grid-gap: 15px;
    justify-content: center;
  }
  .card {
    width: 100px;
    height: 120px;
    background: #34495e;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    perspective: 600px;
  }
  .card-inner {
    position: absolute;
    width: 100%;
    height: 100%;
    transition: transform 0.5s;
    transform-style: preserve-3d;
  }
  .card.flipped .card-inner {
    transform: rotateY(180deg);
    cursor: default;
  }
  .card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 10px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .card-front {
    background: #2980b9;
  }
  .card-back {
    background: #ecf0f1;
    color: #2980b9;
    transform: rotateY(180deg);
  }
  #result {
    margin-top: 25px;
    font-size: 1.8rem;
    font-weight: bold;
  }
  button#restart {
    margin-top: 20px;
    padding: 10px 25px;
    font-size: 1.2rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #27ae60;
    color: white;
    transition: background 0.3s;
  }
  button#restart:hover {
    background: #2ecc71;
  }
</style>
</head>
<body>

<h1>Memory Match Game</h1>
<div id="timer">Time Left: 10:00</div>
<div id="game-board"></div>
<div id="result"></div>
<button id="restart" style="display:none;">Restart Game</button>

<script>
  const board = document.getElementById('game-board');
  const timerDisplay = document.getElementById('timer');
  const resultDisplay = document.getElementById('result');
  const restartBtn = document.getElementById('restart');

  const symbols = ['🍎','🍌','🍇','🍒','🍉','🥝','🍍','🍓'];
  let cards = [];
  let flippedCards = [];
  let matchedPairs = 0;
  let timeLeft = 300; // 10 minutes in seconds
  let countdown;

  // Create card elements with pairs and shuffle
  function initGame() {
    matchedPairs = 0;
    flippedCards = [];
    cards = [...symbols, ...symbols]; // duplicate pairs
    shuffle(cards);

    board.innerHTML = '';
    resultDisplay.textContent = '';
    restartBtn.style.display = 'none';
    timerDisplay.textContent = formatTime(timeLeft);

    cards.forEach((symbol, index) => {
      const card = document.createElement('div');
      card.classList.add('card');
      card.dataset.symbol = symbol;
      card.dataset.index = index;

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back">${symbol}</div>
        </div>
      `;

      card.addEventListener('click', onCardClick);
      board.appendChild(card);
    });

    startTimer();
  }

  function shuffle(array) {
    for (let i = array.length -1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60).toString().padStart(2,'0');
    const s = (seconds % 60).toString().padStart(2,'0');
    return `Time Left: ${m}:${s}`;
  }

  function startTimer() {
    clearInterval(countdown);
    timeLeft = 300;
    timerDisplay.textContent = formatTime(timeLeft);

    countdown = setInterval(() => {
      timeLeft--;
      timerDisplay.textContent = formatTime(timeLeft);
      if (timeLeft <= 0) {
        clearInterval(countdown);
        endGame(false);
      }
    }, 1000);
  }

  function onCardClick(e) {
    const card = e.currentTarget;
    if (
      flippedCards.length === 2 ||
      card.classList.contains('flipped') ||
      timeLeft <= 0
    ) return;

    flipCard(card);
    flippedCards.push(card);

    if (flippedCards.length === 2) {
      checkForMatch();
    }
  }

  function flipCard(card) {
    card.classList.add('flipped');
  }

  function unflipCards() {
    flippedCards.forEach(card => card.classList.remove('flipped'));
    flippedCards = [];
  }

  function checkForMatch() {
    const [card1, card2] = flippedCards;
    if (card1.dataset.symbol === card2.dataset.symbol) {
      matchedPairs++;
      flippedCards = [];
      if (matchedPairs === symbols.length) {
        clearInterval(countdown);
        endGame(true);
      }
    } else {
      setTimeout(() => {
        unflipCards();
      }, 1000);
    }
  }

  function endGame(won) {
    if (won) {
      resultDisplay.textContent = `🎉 Congratulations! You matched all pairs! 🎉`;
    } else {
      resultDisplay.textContent = `⏰ Time's up! Better luck next time.`;
      // flip all cards to reveal symbols
      document.querySelectorAll('.card').forEach(card => card.classList.add('flipped'));
    }
    restartBtn.style.display = 'inline-block';
  }

  restartBtn.addEventListener('click', () => {
    initGame();
  });

  // Initialize on page load
  initGame();

</script>

</body>
</html>
