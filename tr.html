  function translateWord() {
    const input = document.getElementById("searchInput").value.trim().toLowerCase();
    const result = dictionary.find(item =>
      item.en.toLowerCase() === input ||
      item.om.toLowerCase() === input ||
      item.am === input
    );

    if (result) {
      document.getElementById("translationResult").innerHTML =
        `<p><strong>English:</strong> ${result.en}<br>
         <strong>Afaan Oromoo:</strong> ${result.om}<br>
         <strong>Amharic:</strong> ${result.am}</p>`;
    } else {
      document.getElementById("translationResult").innerHTML =
        `<p style="color:red;">Word not found.</p>`;
    }
  }

  function translateSentence() {
    const input = document.getElementById("searchInput").value.trim().toLowerCase();
    const words = input.split(" ");
    let translatedOm = [];
    let translatedAm = [];

    words.forEach(word => {
      const result = dictionary.find(item => item.en.toLowerCase() === word);
      translatedOm.push(result ? result.om : "___");
      translatedAm.push(result ? result.am : "___");
    });

    document.getElementById("translationResult").innerHTML =
      `<p><strong>Afaan Oromoo:</strong> ${translatedOm.join(" ")}<br>
         <strong>Amharic:</strong> ${translatedAm.join(" ")}</p>`;
  }
</script>
